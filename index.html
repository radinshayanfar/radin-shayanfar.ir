    <script>
        // Page title mappings
        const pageTitles = {
            'captcha': 'Captcha Solver',
            'gan': 'Generating Handwritten Persian Characters',
            'habco': 'Habco',
            'jpotify': 'Jpotify',
            'konkur98': 'Konkur98',
            'rjbot': 'RJBot',
            'samcode': 'SamCode',
            'single': 'Single Work',
            'speechbrain': 'SpeechBrain'
        };

        function loadPage(pageName, pushState = true) {
            const contentDiv = document.getElementById('main-content');

            let url = pageName === 'main' ? 'main.html' : `contents/${pageName}.html`;

            // Update page title
            if (pageTitles[pageName]) {
                document.title = `Radin Shayanfar • ${pageTitles[pageName]}`;
            } else if (pageName === 'main') {
                document.title = 'Radin Shayanfar';
            }

            // Update URL in browser address bar using hash
            if (pushState) {
                const newHash = pageName === 'main' ? '' : `#/${pageName}`;
                if (newHash) {
                    window.location.hash = newHash;
                } else {
                    // For main page, clear the hash
                    history.pushState("", document.title, window.location.pathname + window.location.search);
                }
            }

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Failed to load ${url}`);
                    }
                    return response.text();
                })
                .then(html => {
                    contentDiv.innerHTML = html;
                })
                .catch(error => {
                    contentDiv.innerHTML = `<p>Error loading content: ${error.message}</p>`;
                });
        }

        // Handle browser back/forward buttons and hash changes
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash;
            if (hash.startsWith('#/')) {
                const pageName = hash.substring(2); // Remove '#/'
                // Check if the page exists in our page titles
                if (pageTitles[pageName]) {
                    loadPage(pageName, false);
                } else {
                    // Invalid page, go to main
                    loadPage('main', false);
                }
            } else {
                // No hash or invalid hash, load main page
                loadPage('main', false);
            }
        });

        // Also handle popstate for when user navigates to main page without hash
        window.addEventListener('popstate', function(event) {
            if (!window.location.hash) {
                loadPage('main', false);
            }
        });

        // Initial page load based on current URL hash
        function initializePage() {
            const hash = window.location.hash;
            
            if (hash.startsWith('#/')) {
                const pageName = hash.substring(2); // Remove '#/'
                // Check if the page exists in our page titles
                if (pageTitles[pageName]) {
                    loadPage(pageName, false);
                } else {
                    // Invalid page, go to main and clear hash
                    loadPage('main', false);
                    history.replaceState("", document.title, window.location.pathname + window.location.search);
                }
            } else {
                // No hash, load main page
                loadPage('main', false);
            }
        }

        // Handle navigation within the main page (sections)
        function navigateToSection(sectionId) {
            // First load the main page if not already loaded
            const hash = window.location.hash;
            if (hash.startsWith('#/')) {
                loadPage('main');
                // Wait a bit for the page to load, then scroll to section
                setTimeout(() => {
                    const section = document.getElementById(sectionId);
                    if (section) {
                        section.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 300);
            } else {
                const section = document.getElementById(sectionId);
                if (section) {
                    section.scrollIntoView({ behavior: 'smooth' });
                }
            }
        }

        // Initialize the page when DOM is loaded
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
